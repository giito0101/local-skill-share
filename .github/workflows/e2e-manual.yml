name: e2e-manual
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: e2e
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public

      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN_E2E }}
      BLOB_PREFIX: e2e

      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_E2E }}
      NEXTAUTH_URL: http://127.0.0.1:3000
      BASE_URL: http://127.0.0.1:3000
      CI: 1

    steps:
      - uses: actions/checkout@v4

      - uses: npm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 1
          done
          exit 1
        env:
          PGPASSWORD: postgres

      - run: npm prisma db push
      - run: npm db:seed

      - run: npm playwright install --with-deps
      - run: npm e2e

      - name: List Playwright outputs
        if: always()
        run: |
          echo "=== playwright-report ==="
          ls -la playwright-report || true
          echo "=== test-results ==="
          ls -la test-results || true

      # ✅ 失敗しても成果物を必ず回収する
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test-results (trace/screenshots/videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
