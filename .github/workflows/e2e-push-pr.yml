name: e2e-push-pr

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: e2e
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public

      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN_E2E }}
      BLOB_PREFIX: e2e

      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_E2E }}
      NEXTAUTH_URL: http://127.0.0.1:3000
      BASE_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # prisma（必要なら）
      - run: npx prisma generate
      - run: npx prisma db push

      # seed（package.json の scripts に db:seed がある前提）
      - run: npm run db:seed

      # Playwright
      - run: npx playwright install --with-deps

      # e2e（package.json の scripts に e2e がある前提）
      - run: npm run e2e
